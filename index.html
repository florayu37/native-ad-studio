    // ─── CROP MODAL ──────────────────────────────────────────────────────────

    function CropModal({ image, onConfirm, onCancel, outputW = 1600, outputH = 900 }) {
      const ASPECT = outputW / outputH;
      const MAX_W = 720, MAX_H = 480;
      const [dispW, setDispW] = useState(0);
      const [dispH, setDispH] = useState(0);
      const [natW, setNatW] = useState(0);
      const [natH, setNatH] = useState(0);
      const [box, setBox] = useState(null);
      const dragRef = useRef(null);

      const initBox = (dw, dh) => {
        let w = dw * 0.85, h = w / ASPECT;
        if (h > dh * 0.85) { h = dh * 0.85; w = h * ASPECT; }
        setBox({ x: (dw - w) / 2, y: (dh - h) / 2, w, h });
      };

      const onImgLoad = (e) => {
        const img = e.target;
        let dw = img.naturalWidth, dh = img.naturalHeight;
        if (dw > MAX_W) { dh = dh * MAX_W / dw; dw = MAX_W; }
        if (dh > MAX_H) { dw = dw * MAX_H / dh; dh = MAX_H; }
        dw = Math.round(dw); dh = Math.round(dh);
        setNatW(img.naturalWidth); setNatH(img.naturalHeight);
        setDispW(dw); setDispH(dh);
        initBox(dw, dh);
      };

      const clamp = (b) => {
        let { x, y, w, h } = b;
        w = Math.max(40, Math.min(w, dispW));
        h = w / ASPECT;
        if (h > dispH) { h = dispH; w = h * ASPECT; }
        x = Math.max(0, Math.min(x, dispW - w));
        y = Math.max(0, Math.min(y, dispH - h));
        return { x, y, w, h };
      };

      const startDrag = (e, type) => {
        e.preventDefault(); e.stopPropagation();
        dragRef.current = { type, sx: e.clientX, sy: e.clientY, ob: { ...box } };
        const move = (ev) => {
          if (!dragRef.current) return;
          const { type: t, sx, sy, ob } = dragRef.current;
          const dx = ev.clientX - sx, dy = ev.clientY - sy;
          let nb = { ...ob };
          if (t === 'move') { nb.x = ob.x + dx; nb.y = ob.y + dy; }
          else if (t === 'se') { nb.w = ob.w + dx; nb.h = nb.w / ASPECT; }
          else if (t === 'sw') { nb.w = ob.w - dx; nb.x = ob.x + ob.w - nb.w; nb.h = nb.w / ASPECT; }
          else if (t === 'ne') { nb.w = ob.w + dx; nb.h = nb.w / ASPECT; nb.y = ob.y + ob.h - nb.h; }
          else if (t === 'nw') { nb.w = ob.w - dx; nb.x = ob.x + ob.w - nb.w; nb.h = nb.w / ASPECT; nb.y = ob.y + ob.h - nb.h; }
          setBox(clamp(nb));
        };
        const up = () => { dragRef.current = null; window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      const confirm = () => {
        if (!box) return;
        const sx = natW / dispW, sy = natH / dispH;
        onConfirm({ x: Math.round(box.x * sx), y: Math.round(box.y * sy), w: Math.round(box.w * sx), h: Math.round(box.h * sy) });
      };

      const HS = 10;
      const handles = box ? [
        { id: 'nw', x: box.x - HS/2,       y: box.y - HS/2,       cursor: 'nw-resize' },
        { id: 'ne', x: box.x + box.w - HS/2, y: box.y - HS/2,     cursor: 'ne-resize' },
        { id: 'sw', x: box.x - HS/2,       y: box.y + box.h - HS/2, cursor: 'sw-resize' },
        { id: 'se', x: box.x + box.w - HS/2, y: box.y + box.h - HS/2, cursor: 'se-resize' },
      ] : [];

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/75 p-4">
          <div className="bg-white rounded-2xl shadow-2xl overflow-hidden w-full" style={{ maxWidth: MAX_W + 80 }}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
              <div>
                <h2 className="text-sm font-semibold text-slate-800">Manual Crop — 16:9</h2>
                <p className="text-xs text-slate-400 mt-0.5">Drag box to move · corners to resize · ratio locked</p>
              </div>
              <Btn onClick={onCancel} variant="ghost" size="sm">✕</Btn>
            </div>
            <div className="flex justify-center bg-slate-900 p-4">
              <div style={{ position: 'relative', display: 'inline-block', userSelect: 'none', lineHeight: 0 }}>
                <img src={image.preview} onLoad={onImgLoad} style={{ display: 'block', width: dispW || 'auto', height: dispH || 'auto' }} draggable={false} alt="" />
                {box && dispW > 0 && (
                  <>
                    {/* Dim mask — 4 quadrants */}
                    <div style={{ position:'absolute', top:0, left:0, right:0, height:box.y, background:'rgba(0,0,0,0.55)', pointerEvents:'none' }} />
                    <div style={{ position:'absolute', top:box.y, left:0, width:box.x, height:box.h, background:'rgba(0,0,0,0.55)', pointerEvents:'none' }} />
                    <div style={{ position:'absolute', top:box.y, left:box.x+box.w, right:0, height:box.h, background:'rgba(0,0,0,0.55)', pointerEvents:'none' }} />
                    <div style={{ position:'absolute', top:box.y+box.h, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.55)', pointerEvents:'none' }} />
                    {/* Crop box */}
                    <div onMouseDown={e => startDrag(e, 'move')}
                      style={{ position:'absolute', top:box.y, left:box.x, width:box.w, height:box.h, border:'2px solid white', boxSizing:'border-box', cursor:'move' }}>
                      {/* Rule-of-thirds */}
                      {['33.33%','66.66%'].map(p => (
                        <React.Fragment key={p}>
                          <div style={{ position:'absolute', left:p, top:0, bottom:0, borderLeft:'1px solid rgba(255,255,255,0.25)', pointerEvents:'none' }} />
                          <div style={{ position:'absolute', top:p, left:0, right:0, borderTop:'1px solid rgba(255,255,255,0.25)', pointerEvents:'none' }} />
                        </React.Fragment>
                      ))}
                    </div>
                    {/* Corner handles */}
                    {handles.map(h => (
                      <div key={h.id} onMouseDown={e => startDrag(e, h.id)}
                        style={{ position:'absolute', top:h.y, left:h.x, width:HS, height:HS, background:'white', border:'2px solid #6366f1', borderRadius:2, cursor:h.cursor, zIndex:10 }} />
                    ))}
                  </>
                )}
              </div>
            </div>
            <div className="flex items-center justify-between px-5 py-3 border-t border-slate-100">
              <button onClick={() => initBox(dispW, dispH)} className="text-xs text-slate-400 hover:text-slate-600 underline underline-offset-2">Reset</button>
              <div className="flex gap-2">
                <Btn onClick={onCancel} variant="secondary" size="sm">Cancel</Btn>
                <Btn onClick={confirm} size="sm">Apply Crop →</Btn>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── STOCK IMAGE FINDER ───────────────────────────────────────────────────

    const STOCK_SOURCES = [
      { id: 'wikimedia', label: 'Wikimedia Commons', color: '#3b82f6' },
      { id: 'pixabay',   label: 'Pixabay',           color: '#2563eb' },

    async function searchWikimedia(q, limit = 16) {
      const srRes = await fetch(
        `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}+filetype:bitmap&srnamespace=6&srlimit=${limit}&format=json&origin=*`
      );
      const srData = await srRes.json();
      const titles = (srData.query?.search || []).map(r => r.title).join('|');
      if (!titles) return [];
      const infoRes = await fetch(
        `https://commons.wikimedia.org/w/api.php?action=query&prop=imageinfo&iiprop=url|thumburl|mediatype&titles=${encodeURIComponent(titles)}&iiurlwidth=320&format=json&origin=*`
      );
      const infoData = await infoRes.json();
      return Object.values(infoData.query?.pages || {})
        .filter(p => p.imageinfo?.[0]?.thumburl && p.imageinfo[0].mediatype !== 'AUDIO')
        .map(p => ({
          url: p.imageinfo[0].url,
          thumb: p.imageinfo[0].thumburl,
          title: p.title.replace('File:', '').replace(/\.\w+$/, ''),
          source: 'wikimedia',
        }));
    }

    async function searchPixabay(q, apiKey, limit = 16) {
      if (!apiKey) throw new Error('Add a Pixabay API key in Settings to search Pixabay.');
      const res = await fetch(
        `https://pixabay.com/api/?key=${apiKey}&q=${encodeURIComponent(q)}&image_type=photo&orientation=horizontal&per_page=${limit}&safesearch=true`
      );
      if (!res.ok) throw new Error(`Pixabay error ${res.status}`);
      const data = await res.json();
      return (data.hits || []).map(p => ({
        url: p.largeImageURL || p.webformatURL,
        thumb: p.webformatURL,
        title: p.tags || `Pixabay photo by ${p.user}`,
        source: 'pixabay',
      }));
    }

    async function searchPexels(q, apiKey, limit = 16) {
      if (!apiKey) throw new Error('Add a Pexels API key in Settings to search Pexels.');
      const res = await fetch(
        `https://api.pexels.com/v1/search?query=${encodeURIComponent(q)}&per_page=${limit}&orientation=landscape`,
        { headers: { Authorization: apiKey } }
      );
      if (!res.ok) throw new Error(`Pexels error ${res.status}`);
      const data = await res.json();
      return (data.photos || []).map(p => ({
        url: p.src.large2x || p.src.large || p.src.original,
        thumb: p.src.medium,
        title: p.alt || `Pexels photo by ${p.photographer}`,
        source: 'pexels',
      }));
    }

function StockImageFinder({ brief, config, onAddFile, onRemoveUrl, addedUrls = new Set() }) {
      const [sources, setSources] = useState(['wikimedia']);
      const [query, setQuery] = useState(brief?.offerName || '');
      const [perSource, setPerSource] = useState(16);
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState([]);
      const [errors, setErrors] = useState([]);
      const [adding, setAdding] = useState(new Set());

      const toggleSource = (id) => setSources(prev =>
        prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]
      );

      const doSearch = async () => {
        if (!query.trim() || sources.length === 0) return;
        setLoading(true); setResults([]); setErrors([]);
        const errs = [];
        const all = await Promise.all([
          sources.includes('wikimedia') ? searchWikimedia(query, perSource).catch(e => { errs.push('Wikimedia: ' + e.message); return []; }) : [],
          sources.includes('pixabay')   ? searchPixabay(query, config.pixabayApiKey, perSource).catch(e => { errs.push(e.message); return []; }) : [],
          sources.includes('pexels')    ? searchPexels(query, config.pexelsApiKey, perSource).catch(e => { errs.push(e.message); return []; }) : [],
        ]);
        setResults(all.flat());
        setErrors(errs);
        setLoading(false);
      };

      const addImage = async (item) => {
        if (addedUrls.has(item.url)) { onRemoveUrl?.(item.url); return; }
        if (adding.has(item.url)) return;
        setAdding(prev => new Set([...prev, item.url]));
        try {
          const res = await fetch(item.url);
          const blob = await res.blob();
          const rawExt = item.url.split('?')[0].split('.').pop().toLowerCase();
          const ext = ['jpg','jpeg','png','webp','gif'].includes(rawExt) ? rawExt : 'jpg';
          const slug = item.title.replace(/[^a-z0-9]/gi, '_').slice(0, 40);
          const file = new File([blob], `${item.source}_${slug}.${ext}`, { type: blob.type || 'image/jpeg' });
          onAddFile(file, item.url); // pass sourceUrl so parent can track it
        } catch (e) {
          setErrors(prev => [...prev, `Could not download "${item.title}": ${e.message}`]);
        } finally {
          setAdding(prev => { const n = new Set(prev); n.delete(item.url); return n; });
        }
      };

      const sourceBadgeStyle = (src) => ({
        wikimedia: { background: '#dbeafe', color: '#1d4ed8', fontSize: 10, padding: '1px 5px', borderRadius: 4, fontWeight: 600 },
        pixabay:   { background: '#ede9fe', color: '#5b21b6', fontSize: 10, padding: '1px 5px', borderRadius: 4, fontWeight: 600 },
        pexels:    { background: '#d1fae5', color: '#065f46', fontSize: 10, padding: '1px 5px', borderRadius: 4, fontWeight: 600 },
      }[src]);

      return (
        <div className="space-y-3 border border-slate-200 rounded-xl p-4" style={{background:'var(--bg-sub)'}}>
          <p className="text-sm font-semibold text-slate-700">Find Stock Images</p>

          {/* Source toggles + result count */}
          <div className="flex flex-wrap items-center gap-2">
            {STOCK_SOURCES.map(({ id, label, color }) => (
              <button key={id} onClick={() => toggleSource(id)}
                className="px-3 py-1 text-xs rounded-full border transition-all font-medium"
                style={sources.includes(id)
                  ? { background: color + '18', borderColor: color, color }
                  : { background: 'var(--bg-card)', borderColor: 'var(--border)', color: 'var(--text-3)' }}>
                {label}
              </button>
            ))}
            <div className="ml-auto flex items-center gap-1.5">
              <span className="text-xs text-slate-400">Per source:</span>
              {[8, 16, 24].map(n => (
                <button key={n} onClick={() => setPerSource(n)}
                  className="px-2 py-0.5 text-xs rounded border transition-all"
                  style={perSource === n
                    ? { background: '#6366f1', borderColor: '#6366f1', color: '#fff', fontWeight: 600 }
                    : { background: 'var(--bg-card)', borderColor: 'var(--border)', color: 'var(--text-3)' }}>
                  {n}
                </button>
              ))}
            </div>
          </div>

          {/* Search bar */}
          <div className="flex gap-2">
            <input value={query} onChange={e => setQuery(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && doSearch()}
              placeholder="Search images…"
              className="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
              style={{background:'var(--bg-input)', color:'var(--text)'}} />
            <Btn onClick={doSearch} disabled={loading || !query.trim() || sources.length === 0} size="sm">
              {loading ? <Spinner /> : '🔍 Search'}
            </Btn>
          </div>

          {errors.length > 0 && (
            <div className="space-y-1">
              {errors.map((e, i) => <p key={i} className="text-xs text-red-500">{e}</p>)}
            </div>
          )}

          {/* Results grid */}
          {results.length > 0 && (
            <div className="grid grid-cols-3 sm:grid-cols-4 gap-2 max-h-80 overflow-y-auto">
              {results.map((item, i) => {
                const isAdded   = addedUrls.has(item.url);
                const isAdding  = adding.has(item.url);
                return (
                  <div key={i}
                    onClick={() => addImage(item)}
                    className="relative cursor-pointer rounded-lg overflow-hidden border border-slate-200 hover:border-indigo-400 transition-all group"
                    title={item.title}>
                    <img src={item.thumb} alt={item.title}
                      className="w-full h-20 object-cover bg-slate-100"
                      onError={e => { e.target.style.display='none'; }} />
                    {/* overlay */}
                    {isAdded ? (
                      <div className="absolute inset-0 bg-emerald-500/75 group-hover:bg-red-500/75 flex items-center justify-center transition-colors">
                        <span className="text-white text-xl font-bold group-hover:hidden">✓</span>
                        <span className="text-white text-xl font-bold hidden group-hover:block">×</span>
                      </div>
                    ) : isAdding ? (
                      <div className="absolute inset-0 bg-black/40 flex items-center justify-center">
                        <Spinner />
                      </div>
                    ) : (
                      <div className="absolute inset-0 bg-black/0 group-hover:bg-black/35 transition-all flex items-center justify-center">
                        <span className="text-white text-xs font-semibold opacity-0 group-hover:opacity-100">+ Add</span>
                      </div>
                    )}
                    {/* source badge */}
                    <div className="absolute top-1 left-1">
                      <span style={sourceBadgeStyle(item.source)}>
                        {item.source === 'wikimedia' ? 'WK' : item.source === 'pixabay' ? 'PB' : 'PX'}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {!loading && results.length === 0 && errors.length === 0 && (
            <p className="text-xs text-slate-400 text-center py-2">Select sources and search to find images</p>
          )}
        </div>
      );
    }

    // ─── STEP 3: IMAGES ──────────────────────────────────────────────────────

    function Step3({ brief, state, setState, config, onNext, onBack }) {
      const { images, imagePrompts, accessToken, createPlayVariations, removeWatermark, outputSize = { w: 1600, h: 900 }, extraSizes = [] } = state;
      const [loadingPrompts, setLoadingPrompts] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [driveStatus, setDriveStatus] = useState({});
      const [promptError, setPromptError] = useState('');
      const [driveError, setDriveError] = useState('');
      const [folderId, setFolderId] = useState('');
      const [cropTarget, setCropTarget] = useState(null);
      const tokenClientRef = useRef(null);
      const fileRef = useRef();

      useEffect(() => {
        if (!config.googleClientId) return;
        const check = setInterval(() => {
          if (window.google?.accounts?.oauth2) {
            clearInterval(check);
            tokenClientRef.current = google.accounts.oauth2.initTokenClient({
              client_id: config.googleClientId,
              scope: 'https://www.googleapis.com/auth/drive.file',
              callback: resp => { if (resp.access_token) setState(p => ({ ...p, accessToken: resp.access_token })); },
            });
          }
        }, 300);
        return () => clearInterval(check);
      }, [config.googleClientId]);

      const addFiles = (files) => {
        const entries = Array.from(files).map(file => ({
          id: uid(), file, name: file.name,
          preview: URL.createObjectURL(file), processed: null, processedName: null,
          extraCrops: {}, extras: [],
        }));
        setState(p => ({ ...p, images: [...p.images, ...entries] }));
      };

      const processAll = async () => {
        setProcessing(true);
        // Build slug: OfferName → offer_name
        const offerSlug = (brief.offerName || 'creative')
          .trim()
          .replace(/[^a-zA-Z0-9]+/g, '_')
          .replace(/^_|_$/g, '') || 'creative';
        const dateStr = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

        const updated = await Promise.all(images.map(async (img, imgIdx) => {
          const seqNum = String(imgIdx + 1).padStart(2, '0');
          try {
            const isGif = img.file?.type === 'image/gif' || img.file?.name?.toLowerCase().endsWith('.gif');

            // ── Watermark-cleaned source (reused for primary + all extra sizes)
            let cleanFile = img.file;
            if (removeWatermark && !isGif && img.file) {
              try {
                const origUrl = await new Promise(res => {
                  const fr = new FileReader(); fr.onload = () => res(fr.result); fr.readAsDataURL(img.file);
                });
                const cleanedUrl = await removeGeminiWatermark(origUrl);
                const blob = await (await fetch(cleanedUrl)).blob();
                cleanFile = new File([blob], img.file.name, { type: img.file.type || 'image/png' });
              } catch(_) {}
            }

            // ── Step 1: primary size (skipped if Decide is deselected) ────────
            let dataUrl = null, ext = img._ext || 'jpg', gifData = img._gifData, playVariant = null;
            if (outputSize) {
              dataUrl = img.processed;
              if (!dataUrl) {
                if (img.manualCrop) {
                  if (isGif) {
                    if (!gifData) { gifData = await getAnimatedGIFData(img.file); }
                    dataUrl = await processAnimatedGIF(gifData, outputSize.w, outputSize.h, false, img.manualCrop);
                    ext = 'gif';
                  } else {
                    dataUrl = await applyManualCropToFile(cleanFile, img.manualCrop, outputSize.w, outputSize.h);
                    ext = 'jpg';
                  }
                } else {
                  const result = await processImage(cleanFile, outputSize.w, outputSize.h);
                  dataUrl = result.dataUrl; ext = result.ext; gifData = result.gifData;
                }
              }
              // ── Step 2: primary play variant
              if (createPlayVariations) {
                if (ext === 'gif' && gifData) {
                  playVariant = await processAnimatedGIF(gifData, outputSize.w, outputSize.h, true, img.manualCrop || null);
                } else {
                  playVariant = await addPlayButtonOverlay(dataUrl);
                }
              }
            }

            // ── Step 2b: extra sizes (Rumble multi-select) ───────────────────
            const extras = [];
            for (const sz of extraSizes) {
              const key = `${sz.w}x${sz.h}`;
              let szDataUrl, szExt = 'jpg';
              const szCrop = (img.extraCrops || {})[key];
              if (szCrop) {
                szDataUrl = await applyManualCropToFile(cleanFile, szCrop, sz.w, sz.h);
                // applyManualCropToFile always outputs JPEG via canvas
              } else {
                const r = await processImage(cleanFile, sz.w, sz.h);
                szDataUrl = r.dataUrl;
                szExt = r.ext; // 'gif' for animated GIFs
              }
              let szPlay = null;
              if (createPlayVariations && szExt !== 'gif') {
                szPlay = await addPlayButtonOverlay(szDataUrl);
              }
              extras.push({
                size: sz, key,
                dataUrl: szDataUrl,
                name: `${offerSlug}_${dateStr}_${key}_NPB-${seqNum}.${szExt}`,
                playVariant: szPlay,
                playVariantName: szPlay ? `${offerSlug}_${dateStr}_${key}_PB-${seqNum}.${szExt === 'gif' ? 'gif' : 'jpg'}` : null,
              });
            }

            // ── Step 3: names ─────────────────────────────────────────────────
            const playExt = ext === 'gif' ? 'gif' : 'jpg';
            const processedName   = `${offerSlug}_${dateStr}_NPB-${seqNum}.${ext}`;
            const playVariantName = playVariant ? `${offerSlug}_${dateStr}_PB-${seqNum}.${playExt}` : null;

            return { ...img, processed: dataUrl, processedName, _ext: ext, _gifData: gifData, playVariant, playVariantName, extras };
          } catch { return { ...img, processedError: true }; }
        }));
        setState(p => ({ ...p, images: updated }));
        setProcessing(false);
      };

      const saveToDrive = async () => {
        if (!config.googleClientId) { setDriveError('Google Client ID not set — open Settings.'); return; }
        if (!folderId.trim()) { setDriveError('Enter a Drive Folder ID below the Save button.'); return; }
        if (!accessToken) { tokenClientRef.current?.requestAccessToken(); return; }
        setDriveError('');
        const toUpload = images.filter(img => img.processed && !driveStatus[img.id]);
        for (const img of toUpload) {
          setDriveStatus(p => ({ ...p, [img.id]: 'uploading' }));
          try {
            await uploadToDrive(img.processedName, img.processed, folderId.trim(), accessToken);
            if (img.playVariant) await uploadToDrive(img.playVariantName, img.playVariant, folderId.trim(), accessToken);
            for (const ex of (img.extras || [])) {
              await uploadToDrive(ex.name, ex.dataUrl, folderId.trim(), accessToken);
              if (ex.playVariant) await uploadToDrive(ex.playVariantName, ex.playVariant, folderId.trim(), accessToken);
            }
            setDriveStatus(p => ({ ...p, [img.id]: 'done' }));
          } catch {
            setDriveStatus(p => ({ ...p, [img.id]: 'error' }));
            setDriveError('Some uploads failed. Try reconnecting Drive.');
          }
        }
      };

      const generatePrompts = async () => {
        if (!config.anthropicKey) { setPromptError('Add your Anthropic API key in Settings first.'); return; }
        setLoadingPrompts(true); setPromptError('');
        try {
          const raw = await callClaude(GEM_IMAGE_PROMPT(brief), config.anthropicKey);
          const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 15);
          setState(p => ({ ...p, imagePrompts: lines }));
        } catch (e) { setPromptError(e.message); }
        finally { setLoadingPrompts(false); }
      };

      const removeImage = (id) => setState(p => ({ ...p, images: p.images.filter(img => img.id !== id) }));

      const downloadImage = (img) => {
        const a = document.createElement('a');
        a.href = img.processed;
        a.download = img.processedName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      const [zipping, setZipping] = useState(false);
      const downloadAllAsZip = async () => {
        const processable = images.filter(img => img.processed || (img.extras || []).length > 0);
        if (!processable.length) return;
        setZipping(true);
        try {
          const zip = new JSZip();
          processable.forEach(img => {
            if (img.processed) {
              zip.file(img.processedName, img.processed.split(',')[1], { base64: true });
              if (img.playVariant) zip.file(img.playVariantName, img.playVariant.split(',')[1], { base64: true });
            }
            (img.extras || []).forEach(ex => {
              zip.file(ex.name, ex.dataUrl.split(',')[1], { base64: true });
              if (ex.playVariant) zip.file(ex.playVariantName, ex.playVariant.split(',')[1], { base64: true });
            });
          });
          const blob = await zip.generateAsync({ type: 'blob' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${brief.offerName.replace(/[^a-z0-9]/gi, '_') || 'images'}_processed.zip`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        } finally { setZipping(false); }
      };

      const hasProcessed = images.some(img => img.processed || (img.extras || []).length > 0);
      const allProcessed = images.length > 0 && images.every(img => img.processedError || ((!outputSize || img.processed) && extraSizes.every(sz => (img.extras || []).some(ex => ex.key === `${sz.w}x${sz.h}`))));

      return (
        <>
        <div className="fade-in space-y-6">
          <div className="flex items-start justify-between">
            <div>
              <h2 className="text-xl font-bold text-slate-800">Images</h2>
              <p className="text-sm text-slate-500 mt-1">Upload client images, get AI image prompts. {outputSize ? `Smart-crop to ${outputSize.w}×${outputSize.h} JPEG` : 'Process at selected sizes'}, then download or save to Drive.</p>
            </div>
            {images.length > 0 && <Badge color={hasProcessed ? 'emerald' : 'slate'}>{images.filter(i => i.processed).length}/{images.length} processed</Badge>}
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
            {/* Upload */}
            <div className="space-y-3" style={{display:'flex', flexDirection:'column'}}>
              <span className="text-sm font-semibold text-slate-700">Upload Client Images</span>
              <div className="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50/50 transition-all group" style={{flex:1}}
                onClick={() => fileRef.current?.click()}
                onDragOver={e => e.preventDefault()}
                onDrop={e => { e.preventDefault(); addFiles(e.dataTransfer.files); }}>
                <div className="text-3xl mb-2 group-hover:scale-110 transition-transform">🖼</div>
                <p className="text-sm text-slate-500">Drag & drop or <span className="text-indigo-600 font-medium">browse files</span></p>
                <p className="text-xs text-slate-400 mt-1">JPG, PNG, WebP, GIF — any size</p>
                <input ref={fileRef} type="file" multiple accept="image/*" className="hidden" onChange={e => addFiles(e.target.files)} />
              </div>

              {/* Play button variation toggle */}
              <label className="flex items-center gap-2.5 cursor-pointer select-none">
                <div
                  onClick={() => setState(p => ({ ...p, createPlayVariations: !p.createPlayVariations }))}
                  className={`w-9 h-5 rounded-full transition-colors flex-shrink-0 relative ${createPlayVariations ? 'bg-indigo-600' : 'bg-slate-200'}`}
                >
                  <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${createPlayVariations ? 'translate-x-4' : 'translate-x-0.5'}`} />
                </div>
                <span className="text-sm text-slate-700 font-medium">Generate play button variations</span>
                <span className="text-xs text-slate-400">(adds ▶ overlay as extra images)</span>
              </label>

              <label className="flex items-center gap-2.5 cursor-pointer select-none">
                <div
                  onClick={() => setState(p => ({ ...p, removeWatermark: !p.removeWatermark, images: p.images.map(i => ({...i, processed: null, processedName: null, playVariant: null, playVariantName: null, extras: []})) }))}
                  className={`w-9 h-5 rounded-full transition-colors flex-shrink-0 relative ${removeWatermark ? 'bg-teal-500' : 'bg-slate-200'}`}
                >
                  <span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform ${removeWatermark ? 'translate-x-4' : 'translate-x-0.5'}`} />
                </div>
                <span className="text-sm text-slate-700 font-medium">Remove Gemini watermark</span>
                <span className="text-xs text-slate-400">(clones pixels over bottom-right icon)</span>
              </label>

              {/* Output size selector */}
              <div className="space-y-1.5 pt-0.5">
                <div className="flex items-center gap-2">
                  <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Output size</span>
                </div>
                <div className="space-y-1">
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <span className="text-[10px] text-slate-400 font-medium">Decide:</span>
                    {SIZE_PRESETS.filter(p => p.platform === 'Decide').map(p => {
                      const selected = outputSize && outputSize.w === p.w && outputSize.h === p.h;
                      return (
                        <button key={p.label}
                          onClick={() => setState(prev => ({
                            ...prev,
                            outputSize: selected ? null : {w: p.w, h: p.h},
                            images: prev.images.map(i => ({...i, processed: null, processedName: null, playVariant: null, playVariantName: null}))
                          }))}
                          className={`px-2.5 py-1 rounded-lg text-xs font-medium border transition-colors ${selected ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:border-indigo-300 hover:text-indigo-600'}`}
                        >{p.w}×{p.h}</button>
                      );
                    })}
                  </div>
                  <div className="flex items-center gap-1.5 flex-wrap">
                    <span className="text-[10px] text-slate-400 font-medium">Rumble:</span>
                    {SIZE_PRESETS.filter(p => p.platform === 'Rumble').map(p => {
                      const key = `${p.w}x${p.h}`;
                      const selected = extraSizes.some(s => s.w === p.w && s.h === p.h);
                      return (
                        <button key={p.label}
                          onClick={() => setState(prev => {
                            const next = selected
                              ? prev.extraSizes.filter(s => !(s.w === p.w && s.h === p.h))
                              : [...(prev.extraSizes || []), p];
                            return { ...prev, extraSizes: next, images: prev.images.map(i => ({ ...i, extras: [] })) };
                          })}
                          className={`px-2.5 py-1 rounded-lg text-xs font-medium border transition-colors ${selected ? 'bg-violet-600 text-white border-violet-600' : 'bg-white text-slate-600 border-slate-200 hover:border-violet-300 hover:text-violet-600'}`}
                        >{p.label}</button>
                      );
                    })}
                  </div>
                </div>
              </div>

              {images.length > 0 && (
                <div className="space-y-1.5 max-h-72 overflow-y-auto">
                  {images.map(img => {
                    const st = driveStatus[img.id];
                    return (
                      <div key={img.id} className="space-y-1">
                        {/* Base image row */}
                        <div className="flex items-center gap-2.5 p-2.5 bg-white border border-slate-200 rounded-xl group">
                          <img src={img.processed || img.preview} className="w-14 h-9 object-cover rounded-lg flex-shrink-0" alt="" />
                          <div className="flex-1 min-w-0">
                            <p className="text-xs font-medium text-slate-700 truncate">{img.processedName || img.name}</p>
                            <p className="text-xs text-slate-400">
                              {img.processedError ? '⚠ Processing failed' : img.processed ? outputSize ? `✓ ${outputSize.w}×${outputSize.h} ${img._ext === 'gif' ? 'GIF' : img._ext === 'png' ? 'PNG' : 'JPEG'}` : '—' : img.manualCrop ? '✂ Custom crop set' : 'Original'}
                            </p>
                          </div>
                          {st === 'uploading' && <span className="text-xs text-blue-500 flex-shrink-0"><Spinner /></span>}
                          {st === 'done' && <span className="text-xs text-emerald-500 flex-shrink-0">✓ Drive</span>}
                          {st === 'error' && <span className="text-xs text-red-400 flex-shrink-0">✗</span>}
                          <button onClick={() => setCropTarget({ img, sizeKey: null, sizeW: outputSize.w, sizeH: outputSize.h })} title="Manual crop" className="text-slate-300 hover:text-violet-500 transition-colors text-sm flex-shrink-0 opacity-0 group-hover:opacity-100">✂</button>
                          {img.processed && (
                            <button onClick={() => downloadImage(img)} title="Download" className="text-slate-300 hover:text-indigo-500 transition-colors text-base flex-shrink-0 opacity-0 group-hover:opacity-100">↓</button>
                          )}
                          <button onClick={() => removeImage(img.id)} className="text-slate-200 hover:text-red-400 transition-colors text-base flex-shrink-0 opacity-0 group-hover:opacity-100">×</button>
                        </div>
                        {/* Play variant row */}
                        {img.playVariant && (
                          <div className="flex items-center gap-2.5 p-2.5 bg-indigo-50 border border-indigo-100 rounded-xl group ml-4">
                            <div className="w-14 h-9 rounded-lg flex-shrink-0 relative overflow-hidden">
                              <img src={img.playVariant} className="w-full h-full object-cover" alt="" />
                            </div>
                            <div className="flex-1 min-w-0">
                              <p className="text-xs font-medium text-indigo-700 truncate">{img.playVariantName}</p>
                              <p className="text-xs text-indigo-400">▶ Play button variation</p>
                            </div>
                            <button onClick={() => {
                              const a = document.createElement('a');
                              a.href = img.playVariant; a.download = img.playVariantName;
                              document.body.appendChild(a); a.click(); document.body.removeChild(a);
                            }} title="Download" className="text-indigo-200 hover:text-indigo-500 transition-colors text-base flex-shrink-0 opacity-0 group-hover:opacity-100">↓</button>
                          </div>
                        )}
                        {/* Extra sizes (Rumble) */}
                        {extraSizes.map(sz => {
                          const key = `${sz.w}x${sz.h}`;
                          const ex = (img.extras || []).find(e => e.key === key);
                          const hasCrop = !!(img.extraCrops || {})[key];
                          return (
                            <div key={key} className="flex items-center gap-2 p-2 bg-violet-50 border border-violet-100 rounded-xl group ml-4">
                              {ex && <img src={ex.dataUrl} className="w-10 h-7 object-cover rounded flex-shrink-0" alt="" />}
                              <div className="flex-1 min-w-0">
                                <p className="text-xs font-medium text-violet-700">{key}</p>
                                <p className="text-[10px] text-violet-400">{ex ? '✓ processed' : hasCrop ? '✂ crop set' : 'auto-crop'}</p>
                              </div>
                              <button onClick={() => setCropTarget({ img, sizeKey: key, sizeW: sz.w, sizeH: sz.h })} title={`Crop for ${key}`} className="text-violet-200 hover:text-violet-500 transition-colors text-xs flex-shrink-0 opacity-0 group-hover:opacity-100">✂</button>
                              {ex && <button onClick={() => { const a = document.createElement('a'); a.href = ex.dataUrl; a.download = ex.name; document.body.appendChild(a); a.click(); document.body.removeChild(a); }} title="Download" className="text-violet-200 hover:text-violet-500 transition-colors text-sm flex-shrink-0 opacity-0 group-hover:opacity-100">↓</button>}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              )}

              {images.length > 0 && (
                <div className="flex flex-col gap-2">
                  <Btn onClick={processAll} disabled={processing} variant="dark" size="sm" className="w-full justify-center">
                    {processing ? <><Spinner /> Processing...</> : allProcessed && (!createPlayVariations || images.every(i => i.playVariant)) ? '✓ All Processed' : '⚙ Process Images'}
                  </Btn>
                  {hasProcessed && (
                    <div className="flex flex-col gap-2">
                      <div className="flex gap-2">
                        <Btn onClick={downloadAllAsZip} disabled={zipping} variant="secondary" size="sm" className="flex-1 justify-center">
                          {zipping ? <><Spinner /> Zipping...</> : '↓ Download All as ZIP'}
                        </Btn>
                        <Btn onClick={saveToDrive} variant="success" size="sm" className="flex-1 justify-center">
                          {accessToken ? '↑ Save to Drive' : '🔑 Connect Drive'}
                        </Btn>
                      </div>
                      <div className="flex items-center gap-2">
                        <label className="text-xs text-slate-500 whitespace-nowrap">Drive Folder ID</label>
                        <input
                          type="text"
                          value={folderId}
                          onChange={e => setFolderId(e.target.value)}
                          placeholder="Paste folder ID from Drive URL…"
                          className="flex-1 text-xs border border-slate-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-violet-400 bg-white text-slate-700 placeholder-slate-300"
                        />
                      </div>
                    </div>
                  )}
                </div>
              )}
              {driveError && <p className="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg">{driveError}</p>}
            </div>

            {/* Gem Image Prompts */}
            <div className="space-y-3" style={{display:'flex', flexDirection:'column'}}>
              <div className="flex items-center justify-between">
                <div>
                  <span className="text-sm font-semibold text-slate-700">Gem Image Prompts</span>
                  <p className="text-xs text-slate-400 mt-0.5">5 AI-ready prompts for Gemini</p>
                </div>
                <Btn onClick={generatePrompts} disabled={loadingPrompts} size="sm">
                  {loadingPrompts ? <><Spinner /> Generating...</> : '✦ Generate (5)'}
                </Btn>
              </div>
              {promptError && <p className="text-xs text-red-500 bg-red-50 px-3 py-2 rounded-lg">{promptError}</p>}
              {imagePrompts.length === 0 ? (
                <div className="border-2 border-dashed border-slate-200 rounded-xl flex flex-col items-center justify-center text-slate-400 text-sm gap-2" style={{flex:1}}>
                  <span className="text-2xl">💡</span>
                  Generate image prompts aligned to your brief
                </div>
              ) : (
                <div className="space-y-2 max-h-80 overflow-y-auto pr-1">
                  {imagePrompts.map((p, i) => (
                    <GeminiPromptCard key={i} prompt={p} apiKey={config.geminiApiKey} onImageGenerated={dataUrl => {
                      // Convert data URL to File and add to images list
                      fetch(dataUrl).then(r => r.blob()).then(blob => {
                        const file = new File([blob], `gemini_${Date.now()}_${i+1}.png`, { type: 'image/png' });
                        const entry = { id: uid(), file, name: file.name, preview: URL.createObjectURL(blob), processed: null, processedName: null };
                        setState(p => ({ ...p, images: [...p.images, entry] }));
                      });
                    }} />
                  ))}
                </div>
              )}
            </div>
          </div>

          <StockImageFinder
            brief={brief}
            config={config}
            addedUrls={new Set(images.filter(i => i.sourceUrl).map(i => i.sourceUrl))}
            onAddFile={(file, sourceUrl) => {
              const entry = { id: uid(), file, name: file.name, preview: URL.createObjectURL(file), sourceUrl: sourceUrl || null, processed: null, processedName: null, extraCrops: {}, extras: [] };
              setState(p => ({ ...p, images: [...p.images, entry] }));
            }}
            onRemoveUrl={(sourceUrl) => {
              setState(p => ({ ...p, images: p.images.filter(i => i.sourceUrl !== sourceUrl) }));
            }}
          />

          <div className="flex justify-between pt-2">
            <Btn onClick={onBack} variant="ghost">← Back</Btn>
            <Btn onClick={onNext} size="lg">Next: Export →</Btn>
          </div>
        </div>

        {cropTarget && (
          <CropModal
            image={cropTarget.img}
            outputW={cropTarget.sizeW}
            outputH={cropTarget.sizeH}
            onConfirm={(coords) => {
              setState(p => ({
                ...p,
                images: p.images.map(img => img.id === cropTarget.img.id
                  ? cropTarget.sizeKey
                    ? { ...img, extraCrops: { ...(img.extraCrops || {}), [cropTarget.sizeKey]: coords },
                        extras: (img.extras || []).filter(e => e.key !== cropTarget.sizeKey) }
                    : { ...img, manualCrop: coords, processed: null, processedName: null, playVariant: null, playVariantName: null }
                  : img
                )
              }));
              setCropTarget(null);
            }}
            onCancel={() => setCropTarget(null)}
          />
        )}
        </>
      );
    }

    // ─── STEP 4: BRIEF BUILDER & EXPORT ─────────────────────────────────────

    const CTA_OPTIONS = ['Find Out More', 'Learn More', 'Watch The Video', 'Take The Quiz', 'Get A Quote', 'Other'];
    const QUALITY_OPTIONS = ['Red', 'Yellow', 'Green'];

    function escHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ─── shared brief data builder (used by both text + html) ────────────────
    function buildBriefData({ brief, headlineState, imageState, traits, imageTitles = {}, boldTitles = new Set() }) {
      const selected = headlineState.selected || [];
      const launchHeadlines = headlineState.launchPackage || [];
      const processedImages = imageState.images.filter(img => img.processed);

      const allTraffic = selected.filter(s => !s.source || s.source === 'traffic' || s.source === 'client_traffic');
      const pollSelected = selected.filter(s => s.source === 'poll' || s.source === 'client_poll');

      let imgIndex = 1;
      const imgEntries = processedImages.flatMap(img => {
        const baseTitle = imageTitles[img.id] || '';
        const isBold = boldTitles.has(img.id);
        const pbTitle = baseTitle ? baseTitle + ' (PB)' : '';
        const rows = [{ name: img.processedName, title: baseTitle, isPB: false, isBold }];
        if (img.playVariant) rows.push({ name: img.playVariantName, title: pbTitle, isPB: true, isBold });
        return rows.map(r => ({ ...r, n: imgIndex++ }));
      });

      return {
        offer: brief.offerName || '—',
        ra: brief.ra || '—',
        lockerLink: brief.lockerLink || '—',
        allTraffic,
        pollSelected,
        launchHeadlines,
        imgFolder: imageState.driveFolderUrl || '[Paste Google Drive Link]',
        imgEntries,
        description: traits.description || '—',
        cta: traits.cta === 'Other' ? traits.ctaOther || '—' : traits.cta || '—',
        quality: traits.quality || '—',
        isPolitical: traits.isPolitical || 'Not Political',
      };
    }

    // ─── plain-text version (for .txt download) ──────────────────────────────
    function buildBriefText(args) {
      const d = buildBriefData(args);
      const fmt = h => d.launchHeadlines.includes(h) ? `**${h}**` : h;
      const lines = [];

      lines.push(`Offer(s):\n${d.offer}`);
      lines.push(`RA(s):\n${d.ra}`);
      lines.push(`Locker Link(s):\n${d.lockerLink}`);

      const headlineSections = [];
      if (d.allTraffic.length > 0)
        headlineSections.push(`Traffic Unit Headlines:\n${d.allTraffic.map(s => fmt(s.text)).join('\n')}`);
      if (d.pollSelected.length > 0)
        headlineSections.push(`Poll Style Headlines:\n${d.pollSelected.map(s => fmt(s.text)).join('\n')}`);
      lines.push(`Headlines:\n*Bold = launch package.\n\n` + (headlineSections.join('\n\n') || '—'));

      lines.push(`Images:\n${d.imgFolder}`);

      // Cover image title table (only if at least one title has been generated)
      if (d.imgEntries.some(e => e.title)) {
        const fmtTitle = e => e.isBold && e.title ? `**${e.title}**` : (e.title || '—');
        const rows = d.imgEntries.map(e => `${e.name} | ${fmtTitle(e)}`).join('\n');
        lines.push(`Cover Image Titles:\n*Bold = launch package.\nFile Name | Cover Media Title\n${rows}`);
      }

      lines.push(`Description:\n${d.description}`);
      lines.push(`CTA:\n${d.cta}`);
      lines.push(`Quality\n${d.quality}`);
      lines.push(`Is Political\n${d.isPolitical}`);

      return lines.join('\n\n');
    }

    // ─── HTML version (rich clipboard → Asana bold renders correctly) ─────────
    function buildBriefHTML(args) {
      const d = buildBriefData(args);
      const fmtH = h => d.launchHeadlines.includes(h)
        ? `<strong>${escHtml(h)}</strong>`
        : escHtml(h);

      const sec = (label, content) =>
        `<p><strong>${label}</strong><br>${content}</p>`;

      const headlineParts = [];
      if (d.allTraffic.length > 0)
        headlineParts.push(`<strong>Traffic Unit Headlines:</strong><br>${d.allTraffic.map(s => fmtH(s.text)).join('<br>')}`);
      if (d.pollSelected.length > 0)
        headlineParts.push(`<strong>Poll Style Headlines:</strong><br>${d.pollSelected.map(s => fmtH(s.text)).join('<br>')}`);

      const parts = [
        sec('Offer(s):', escHtml(d.offer)),
        sec('RA(s):', escHtml(d.ra)),
        sec('Locker Link(s):', escHtml(d.lockerLink)),
        `<p><strong>Headlines:</strong><br><em>*Bold = launch package.</em><br><br>${headlineParts.join('<br><br>') || '—'}</p>`,
        sec('Images:', escHtml(d.imgFolder)),
        ...(d.imgEntries.some(e => e.title) ? [`<p><strong>Cover Image Titles:</strong><br><em>*Bold = launch package.</em><br>
<table style="border-collapse:collapse;width:100%;font-size:13px;margin-top:6px">
<thead><tr>
<th style="text-align:left;padding:5px 10px;border:1px solid #e2e8f0;background:#f8fafc">File Name</th>
<th style="text-align:left;padding:5px 10px;border:1px solid #e2e8f0;background:#f8fafc">Cover Media Title</th>
</tr></thead>
<tbody>${d.imgEntries.map(e => `<tr>
<td style="padding:5px 10px;border:1px solid #e2e8f0;font-family:monospace;font-size:12px">${escHtml(e.name)}</td>
<td style="padding:5px 10px;border:1px solid #e2e8f0">${e.isBold && e.title ? `<strong>${escHtml(e.title)}</strong>` : escHtml(e.title || '—')}</td>
</tr>`).join('')}
</tbody></table></p>`] : []),
        sec('Description:', escHtml(d.description)),
        sec('CTA:', escHtml(d.cta)),
        sec('Quality', escHtml(d.quality)),
        sec('Is Political', escHtml(d.isPolitical)),
      ];

      return `<div style="font-family:sans-serif;font-size:14px;line-height:1.7">${parts.join('\n')}</div>`;
    }

    function Step4({ brief, headlineState, setHeadlineState, imageState, onBack, onGoToBrief, onGoToHeadlines, config }) {
      const { selected: selectedRaw, universalDesc, launchPackage = [], clientTrafficText = '', clientPollText = '' } = headlineState;
      const { images } = imageState;

      const briefComplete = !!brief.offerName.trim();
      const headlinesComplete = selectedRaw.length > 0 || clientTrafficText.trim() || clientPollText.trim();
      const canExport = briefComplete && headlinesComplete;

      const [traits, setTraits] = useState({
        description: universalDesc || '',
        cta: 'Learn More',
        ctaOther: '',
        quality: 'Green',
        isPolitical: 'Not Political',
      });
      const [copied, setCopied] = useState(false);
      // imageTitles: { [imgId]: 'Cover Title' }
      const [imageTitles, setImageTitles] = useState({});
      const [boldTitles, setBoldTitles] = useState(new Set()); // imgIds whose title is bolded
      const [titlesLoading, setTitlesLoading] = useState(false);
      const [titlesError, setTitlesError] = useState('');

      const toggleBoldTitle = (imgId) => setBoldTitles(prev => {
        const next = new Set(prev);
        next.has(imgId) ? next.delete(imgId) : next.add(imgId);
        return next;
      });
      const set = (k, v) => setTraits(p => ({ ...p, [k]: v }));

      useEffect(() => {
        if (universalDesc && !traits.description) set('description', universalDesc);
      }, [universalDesc]);

      // Group selected headlines by type for the brief
      const trafficSelected = selectedRaw.filter(s => !s.source || s.source === 'traffic' || s.source === 'client_traffic');
      const pollSelected    = selectedRaw.filter(s => s.source === 'poll' || s.source === 'client_poll');
      const processedImages = images.filter(img => img.processed);

      // Auto-generate cover titles when step loads
      useEffect(() => {
        if (!config.anthropicKey || processedImages.length === 0) return;
        const uncovered = processedImages.filter(img => !imageTitles[img.id]);
        if (uncovered.length === 0) return;
        runTitleGeneration(uncovered);
      }, [processedImages.length]);

      const runTitleGeneration = async (imgs) => {
        setTitlesLoading(true);
        setTitlesError('');
        try {
          await Promise.all(imgs.map(async img => {
            try {
              const title = await generateImageTitle(img.processed, img._ext === 'gif', config.anthropicKey);
              setImageTitles(prev => ({ ...prev, [img.id]: title }));
            } catch {
              setImageTitles(prev => ({ ...prev, [img.id]: '—' }));
            }
          }));
        } catch (e) {
          setTitlesError(e.message);
        } finally {
          setTitlesLoading(false);
        }
      };

      const toggleLaunch = (h) => {
        setHeadlineState(p => ({
          ...p,
          launchPackage: (p.launchPackage || []).includes(h)
            ? (p.launchPackage || []).filter(x => x !== h)
            : [...(p.launchPackage || []), h],
        }));
      };

      const briefArgs = { brief, headlineState: { ...headlineState, launchPackage }, imageState, traits, imageTitles, boldTitles };
      const briefText = buildBriefText(briefArgs);

      const copyToClipboard = async () => {
        try {
          // Write both HTML (for Asana/Notion rich text bold) and plain text fallback
          const htmlBlob  = new Blob([buildBriefHTML(briefArgs)],  { type: 'text/html' });
          const textBlob  = new Blob([briefText],                  { type: 'text/plain' });
          await navigator.clipboard.write([new ClipboardItem({ 'text/html': htmlBlob, 'text/plain': textBlob })]);
        } catch {
          // Fallback: plain text only
          await navigator.clipboard.writeText(briefText).catch(() => {});
        }
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const downloadBrief = () => {
        const blob = new Blob([briefText], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${brief.offerName.replace(/[^a-z0-9]/gi, '_') || 'brief'}_ContentBrief_${new Date().toISOString().slice(0,10)}.txt`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      return (
        <div className="fade-in space-y-6">
          <div>
            <h2 className="text-xl font-bold text-slate-800">Content Brief</h2>
            <p className="text-sm text-slate-500 mt-1">Fill in the remaining fields, mark your launch package headlines, then copy or download the brief for DollarBird.</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

            {/* ── Left: Form ── */}
            <div className="space-y-5">

              {/* Description */}
              <div>
                <div className="flex items-center gap-2 mb-1">
                  <label className="text-sm font-medium text-slate-700">Description</label>
                  <span className={`text-xs font-mono ${charClass(traits.description.length, 120)}`}>{traits.description.length}/120</span>
                </div>
                <input value={traits.description} onChange={e => set('description', e.target.value)}
                  placeholder="Universal description — bridges headlines to the landing page..."
                  className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" />
              </div>

              {/* CTA */}
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">CTA</label>
                <div className="grid grid-cols-2 gap-2">
                  {CTA_OPTIONS.map(opt => (
                    <button key={opt} onClick={() => set('cta', opt)}
                      className={`text-sm px-3 py-2 rounded-lg border font-medium transition-all text-left ${
                        traits.cta === opt ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'
                      }`}>
                      {traits.cta === opt ? '● ' : '○ '}{opt}
                    </button>
                  ))}
                </div>
                {traits.cta === 'Other' && (
                  <input value={traits.ctaOther} onChange={e => set('ctaOther', e.target.value)}
                    placeholder="Specify CTA text..."
                    className="mt-2 w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white" />
                )}
              </div>

              {/* Quality */}
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Quality</label>
                <div className="flex gap-2">
                  {QUALITY_OPTIONS.map(q => {
                    const colors = { Red: 'bg-red-50 border-red-300 text-red-700', Yellow: 'bg-yellow-50 border-yellow-300 text-yellow-700', Green: 'bg-emerald-50 border-emerald-300 text-emerald-700' };
                    const inactive = 'bg-white border-slate-200 text-slate-600 hover:border-slate-300';
                    return (
                      <button key={q} onClick={() => set('quality', q)}
                        className={`flex-1 text-sm px-3 py-2 rounded-lg border font-medium transition-all ${traits.quality === q ? colors[q] : inactive}`}>
                        {q}
                      </button>
                    );
                  })}
                </div>
                <p className="text-xs text-slate-400 mt-1">If multiple values needed, pick one and batch edit manually in Global Report after DollarBird builds creatives.</p>
              </div>

              {/* Is Political */}
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Is Political</label>
                <div className="flex gap-2">
                  {['Not Political', 'Right', 'Left', 'Moderate'].map(v => (
                    <button key={v} onClick={() => set('isPolitical', v)}
                      className={`flex-1 text-sm px-3 py-2 rounded-lg border font-medium transition-all ${
                        traits.isPolitical === v ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'
                      }`}>
                      {v}
                    </button>
                  ))}
                </div>
                <p className="text-xs text-slate-400 mt-1">If multiple values needed, pick one and batch edit manually in Global Report after DollarBird builds creatives.</p>
              </div>

              {/* Launch package headlines — grouped by type */}
              {selectedRaw.length > 0 && (
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    Launch Package Headlines
                    <span className="ml-2 text-xs text-slate-400 font-normal">— bold in brief</span>
                  </label>
                  <div className="space-y-3 max-h-56 overflow-y-auto pr-1">
                    {trafficSelected.length > 0 && (
                      <div>
                        <p className="text-xs font-semibold text-indigo-500 uppercase tracking-wide mb-1">Traffic Unit</p>
                        <div className="space-y-1">
                          {trafficSelected.map((s, i) => {
                            const isLaunch = launchPackage.includes(s.text);
                            return (
                              <div key={i} onClick={() => toggleLaunch(s.text)}
                                className={`flex items-center gap-2.5 px-3 py-2 rounded-lg border cursor-pointer transition-all text-sm ${
                                  isLaunch ? 'border-indigo-200 bg-indigo-50 font-semibold text-slate-800' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300'
                                }`}>
                                <span className={`w-4 h-4 rounded border-2 flex-shrink-0 flex items-center justify-center text-xs ${isLaunch ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300'}`}>
                                  {isLaunch && 'B'}
                                </span>
                                {s.text}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                    {pollSelected.length > 0 && (
                      <div>
                        <p className="text-xs font-semibold text-violet-500 uppercase tracking-wide mb-1">Poll Style</p>
                        <div className="space-y-1">
                          {pollSelected.map((s, i) => {
                            const isLaunch = launchPackage.includes(s.text);
                            return (
                              <div key={i} onClick={() => toggleLaunch(s.text)}
                                className={`flex items-center gap-2.5 px-3 py-2 rounded-lg border cursor-pointer transition-all text-sm ${
                                  isLaunch ? 'border-violet-200 bg-violet-50 font-semibold text-slate-800' : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300'
                                }`}>
                                <span className={`w-4 h-4 rounded border-2 flex-shrink-0 flex items-center justify-center text-xs ${isLaunch ? 'bg-violet-600 border-violet-600 text-white' : 'border-slate-300'}`}>
                                  {isLaunch && 'B'}
                                </span>
                                {s.text}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* Cover Image Titles table */}
              {processedImages.length > 0 && (
                <div>
                  <div className="flex items-center justify-between mb-2">
                    <label className="text-sm font-medium text-slate-700">
                      Cover Image Titles
                      <span className="ml-2 text-xs text-slate-400 font-normal">— AI-generated, included in brief</span>
                    </label>
                    <Btn size="sm" variant="ghost"
                      disabled={titlesLoading}
                      onClick={() => runTitleGeneration(processedImages)}>
                      {titlesLoading ? <><Spinner /> Generating...</> : '↻ Regenerate'}
                    </Btn>
                  </div>
                  {titlesError && <p className="text-xs text-red-500 mb-2">{titlesError}</p>}
                  {!config.anthropicKey && (
                    <p className="text-xs text-slate-400 italic">Add Anthropic API key in Settings to auto-generate titles.</p>
                  )}
                  <div className="border border-slate-200 rounded-xl overflow-hidden">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-slate-50 border-b border-slate-200">
                          <th className="px-3 py-2 w-6"></th>
                          <th className="text-left px-3 py-2 text-slate-500 font-medium" style={{width:'52%'}}>File Name</th>
                          <th className="text-left px-3 py-2 text-slate-500 font-medium">Cover Media Title</th>
                        </tr>
                      </thead>
                      <tbody>
                        {processedImages.flatMap((img) => {
                          const baseTitle = imageTitles[img.id];
                          const isBold = boldTitles.has(img.id);
                          const rows = [{ key: img.id + '_npb', name: img.processedName, isPB: false }];
                          if (img.playVariant) rows.push({ key: img.id + '_pb', name: img.playVariantName, isPB: true });
                          return rows.map((r) => (
                            <tr key={r.key}
                              onClick={() => !r.isPB && toggleBoldTitle(img.id)}
                              className={`border-b border-slate-100 last:border-0 transition-colors
                                ${r.isPB ? 'bg-indigo-50/40' : isBold ? 'bg-amber-50 cursor-pointer' : 'hover:bg-slate-50 cursor-pointer'}`}>
                              <td className="px-3 py-2 text-center">
                                {!r.isPB && (
                                  <span className={`inline-flex w-4 h-4 rounded border-2 items-center justify-center text-xs font-bold transition-colors ${
                                    isBold ? 'bg-amber-500 border-amber-500 text-white' : 'border-slate-300 text-slate-300'
                                  }`}>B</span>
                                )}
                                {r.isPB && isBold && (
                                  <span className="inline-flex w-4 h-4 rounded border-2 items-center justify-center text-xs font-bold bg-amber-500 border-amber-500 text-white opacity-50">B</span>
                                )}
                              </td>
                              <td className="px-3 py-2 font-mono text-slate-500 truncate max-w-0" style={{maxWidth:'1px'}}>
                                <span className="block truncate" title={r.name}>{r.name || '—'}</span>
                              </td>
                              <td className="px-3 py-2 text-slate-700" onClick={e => r.isPB && e.stopPropagation()}>
                                {baseTitle === undefined
                                  ? <span className="text-slate-300 italic">{config.anthropicKey ? <Spinner /> : '—'}</span>
                                  : r.isPB
                                    ? <span className={isBold ? 'font-semibold text-slate-800' : 'text-slate-500'}>
                                        {baseTitle ? baseTitle + ' (PB)' : <span className="italic text-slate-300">—</span>}
                                      </span>
                                    : <input value={baseTitle || ''} onChange={e => { e.stopPropagation(); setImageTitles(p => ({ ...p, [img.id]: e.target.value })); }}
                                        onClick={e => e.stopPropagation()}
                                        className={`w-full bg-transparent focus:outline-none focus:ring-1 focus:ring-amber-400 rounded px-1 -mx-1 ${isBold ? 'font-semibold' : ''}`}
                                        placeholder="—" />
                                }
                              </td>
                            </tr>
                          ));
                        })}
                      </tbody>
                    </table>
                  </div>
                  <p className="text-xs text-slate-400 mt-1">Click a row to toggle bold — bolded titles appear as launch package in the brief.</p>
                </div>
              )}
            </div>

            {/* ── Right: Brief Preview ── */}
            <div className="space-y-3" style={{display:'flex', flexDirection:'column'}}>
              <div className="flex items-center">
                <span className="text-sm font-semibold text-slate-700">Brief Preview</span>
              </div>
              <div className="border border-slate-200 rounded-xl bg-slate-50 p-4 overflow-y-auto" style={{flex:1, minHeight:'200px', resize:'vertical'}}>
                <pre className="text-xs text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">
                  {briefText.split('\n').map((line, i) => {
                    // Whole-line bold: **headline**
                    if (line.startsWith('**') && line.endsWith('**')) {
                      return <span key={i}><strong>{line.slice(2, -2)}</strong>{'\n'}</span>;
                    }
                    // Inline bold inside pipe rows: filename | **Title (PB)**
                    if (line.includes(' | **') && line.endsWith('**')) {
                      const pipeIdx = line.lastIndexOf(' | **');
                      const before = line.slice(0, pipeIdx + 3); // up to "| "
                      const bolded = line.slice(pipeIdx + 5, -2);   // strip ** **
                      return <span key={i}>{before}<strong>{bolded}</strong>{'\n'}</span>;
                    }
                    // Section headers
                    const isHeader = ['Offer(s):', 'RA(s):', 'Locker Link(s):', 'Headlines:', 'Traffic Unit Headlines:', 'Poll Style Headlines:', 'Images:', 'Cover Image Titles:', 'Description:', 'CTA:', 'Quality', 'Is Political'].some(h => line.startsWith(h));
                    if (isHeader) return <span key={i}><strong className="text-slate-900">{line}</strong>{'\n'}</span>;
                    return <span key={i}>{line}{'\n'}</span>;
                  })}
                </pre>
              </div>
            </div>
          </div>

          {!canExport && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-800 flex flex-col gap-1">
              <span className="font-semibold">Complete required steps to export</span>
              <div className="flex flex-col gap-0.5 text-xs text-amber-700">
                {!briefComplete && (
                  <span>• <button onClick={onGoToBrief} className="underline underline-offset-2 hover:text-amber-900">Step 1: Offer Brief</button> — offer name required</span>
                )}
                {!headlinesComplete && (
                  <span>• <button onClick={onGoToHeadlines} className="underline underline-offset-2 hover:text-amber-900">Step 2: Headlines</button> — add or select at least one headline</span>
                )}
              </div>
            </div>
          )}

          <div className="flex justify-between items-center pt-2">
            <Btn onClick={onBack} variant="ghost">← Back</Btn>
            <div className="flex gap-2">
              <Btn onClick={copyToClipboard} disabled={!canExport} variant={copied ? 'success' : 'secondary'} size="lg">
                {copied ? '✓ Copied to Clipboard' : '⎘ Copy Brief'}
              </Btn>
              <Btn onClick={downloadBrief} disabled={!canExport} variant="primary" size="lg">↓ Download Brief</Btn>
            </div>
          </div>
        </div>
      );
    }

    // ─── ROOT APP ────────────────────────────────────────────────────────────

    const DEFAULT_CONFIG = { anthropicKey: '', serpApiKey: '', googleClientId: '', geminiApiKey: '', pexelsApiKey: '', pixabayApiKey: '' };

    function App() {
      const [step, setStep] = useState(1);
      const [maxReached, setMaxReached] = useState(1);
      const [showSettings, setShowSettings] = useState(false);

      const [config, setConfig] = useState(() => {
        try { return { ...DEFAULT_CONFIG, ...JSON.parse(localStorage.getItem('nads_cfg') || '{}') }; }
        catch { return DEFAULT_CONFIG; }
      });

      const [brief, setBrief] = useState({
        offerName: '', angle: '', audience: '', landingPage: '', ra: '', lockerLink: '',
      });

      const [headlineState, setHeadlineState] = useState({
        clientTrafficText: '',  // client-provided traffic unit headlines, one per line
        clientPollText: '',     // client-provided poll style headlines, one per line
        trafficHeadlines: [],
        pollHeadlines: [],
        universalDesc: '',
        selected: [],      // [{ key, text, source }]
        editingKey: null,
      });

      const [imageState, setImageState] = useState({
        images: [],
        imagePrompts: [],
        accessToken: null,
        createPlayVariations: false,
        removeWatermark: false,
        outputSize: { w: 1600, h: 900 },
        extraSizes: [],
      });

      // No forced settings open — API key is optional (only needed for AI generation)

      const [darkMode, setDarkMode] = useState(() => {
        try { return localStorage.getItem('nads_dark') === 'true'; } catch { return false; }
      });
      const toggleDark = () => setDarkMode(d => {
        const next = !d;
        try { localStorage.setItem('nads_dark', String(next)); } catch {}
        return next;
      });

      const goTo = (n) => { setStep(n); setMaxReached(p => Math.max(p, n)); };
      const skipToImages = () => goTo(3);
      const saveConfig = (c) => { setConfig(c); setShowSettings(false); try { localStorage.setItem('nads_cfg', JSON.stringify(c)); } catch {} };

      return (
        <div className={`min-h-screen${darkMode ? ' dark-mode' : ''}`} style={{ background: 'var(--bg)', color: 'var(--text)' }}>
          {/* Gradient top bar */}
          <div className="dc-topbar" />

          {/* Header — always dark, Decide-style */}
          <header className="dc-header">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
              <div className="flex items-center gap-3 min-w-0 flex-shrink-0">
                <span style={{ fontWeight: 900, fontSize: 15, color: '#fff', letterSpacing: '-0.03em', fontFamily: 'Inter, sans-serif' }}>
                  Decide
                  <span style={{ color: '#555', fontWeight: 400, margin: '0 6px' }}>·</span>
                  <span style={{ color: '#aaa', fontWeight: 600 }}>Native Ad Studio</span>
                </span>
                {brief.offerName && <span style={{ fontSize: 11, color: '#555', fontWeight: 500 }} className="hidden sm:inline">— {brief.offerName}</span>}
              </div>
              <div className="flex-1 flex justify-center px-4 hidden md:flex">
                <StepNav current={step} maxReached={maxReached} onChange={goTo} />
              </div>
              <div className="flex items-center gap-2">
                <button
                  onClick={toggleDark}
                  title={darkMode ? 'Switch to light' : 'Switch to dark'}
                  style={{ background: 'none', border: '1.5px solid #333', borderRadius: 3, padding: '4px 10px', color: '#888', fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', cursor: 'pointer', fontFamily: 'Inter, sans-serif', transition: 'all 0.15s' }}
                  onMouseEnter={e => { e.target.style.borderColor = 'var(--accent)'; e.target.style.color = 'var(--accent)'; }}
                  onMouseLeave={e => { e.target.style.borderColor = '#333'; e.target.style.color = '#888'; }}>
                  {darkMode ? '☀ Light' : '◐ Dark'}
                </button>
                <button
                  onClick={() => setShowSettings(true)}
                  style={{ background: 'none', border: '1.5px solid #333', borderRadius: 3, padding: '4px 10px', color: '#888', fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', cursor: 'pointer', fontFamily: 'Inter, sans-serif', transition: 'all 0.15s' }}
                  onMouseEnter={e => { e.target.style.borderColor = 'var(--accent)'; e.target.style.color = 'var(--accent)'; }}
                  onMouseLeave={e => { e.target.style.borderColor = '#333'; e.target.style.color = '#888'; }}>
                  ⚙ Settings
                </button>
              </div>
            </div>
            <div className="md:hidden px-4 pb-3">
              <StepNav current={step} maxReached={maxReached} onChange={goTo} />
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
            <Card className="p-6 sm:p-8">
              {step === 1 && <Step1 brief={brief} onChange={setBrief} onNext={() => goTo(2)} onSkipToImages={skipToImages} config={config} />}
              {step === 2 && <Step2 brief={brief} state={headlineState} setState={setHeadlineState} config={config} onNext={() => goTo(3)} onBack={() => goTo(1)} />}
              {step === 3 && <Step3 brief={brief} state={imageState} setState={setImageState} config={config} onNext={() => goTo(4)} onBack={() => goTo(2)} />}
              {step === 4 && <Step4 brief={brief} headlineState={headlineState} setHeadlineState={setHeadlineState} imageState={imageState} onBack={() => goTo(3)} onGoToBrief={() => goTo(1)} onGoToHeadlines={() => goTo(2)} config={config} />}
            </Card>
            <p className="text-center mt-4" style={{ fontSize: 11, color: 'var(--text-3)' }}>
              API keys stored locally
            </p>
          </main>

          {showSettings && <SettingsModal config={config} onSave={saveConfig} onClose={() => setShowSettings(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
